name: PR CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt coverage

      - name: Run maintained unit tests with coverage
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path

          modules = sorted(
              path.as_posix().replace("/", ".").removesuffix(".py")
              for path in Path("tests").glob("test_v2_*.py")
              if path.name != "test_v2_agent.py"
          )
          if not modules:
              raise SystemExit("No stable backend test modules were discovered.")

          subprocess.run(
              ["coverage", "run", "-m", "unittest", *modules, "-v"],
              check=True,
          )
          PY
          coverage xml -o coverage.xml
          coverage report -m | tee coverage-report.txt

      - name: Publish coverage summary
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          root = ET.parse("coverage.xml").getroot()
          line_rate = float(root.attrib.get("line-rate", "0"))
          lines_valid = int(root.attrib.get("lines-valid", "0"))
          lines_covered = int(root.attrib.get("lines-covered", "0"))
          summary = Path("coverage-report.txt").read_text(encoding="utf-8")

          with open(Path.cwd() / Path(".github-step-summary.tmp"), "w", encoding="utf-8") as handle:
              handle.write("## Backend coverage\n\n")
              handle.write(f"- Line coverage: {line_rate * 100:.2f}%\n")
              handle.write(f"- Covered lines: {lines_covered}/{lines_valid}\n\n")
              handle.write("```text\n")
              handle.write(summary.strip())
              handle.write("\n```\n")
          PY
          cat .github-step-summary.tmp >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: coverage.xml

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
